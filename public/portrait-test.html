<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portrait Test — The Folly</title>
  <style>
    :root {
      --bg: #1a1610;
      --panel: #27211a;
      --ink: #e8dfcc;
      --muted: #9a907a;
      --accent: #b58a46;
      --border: #3a3226;
      --error: #d06060;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.5;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 48px; }
    header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }
    header h1 { margin: 0 0 4px; font-size: 24px; color: var(--accent); }
    header p { margin: 0; color: var(--muted); font-size: 14px; }
    section { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; margin-bottom: 20px; }
    section h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent); font-weight: normal; letter-spacing: 0.05em; text-transform: uppercase; }
    label { display: block; margin-bottom: 10px; font-size: 14px; }
    label span.lbl { display: inline-block; width: 120px; color: var(--muted); }
    input[type=text], select {
      background: var(--bg); color: var(--ink);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 6px 8px; font: inherit; font-size: 14px;
      width: calc(100% - 130px); max-width: 560px;
    }
    button {
      background: var(--accent); color: #201810;
      border: 0; border-radius: 3px;
      padding: 8px 18px; font: inherit; font-size: 14px; font-weight: bold;
      cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--border); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .media { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
    .media > div { background: var(--bg); border: 1px dashed var(--border); border-radius: 4px; padding: 10px; }
    .media h3 { margin: 0 0 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: normal; }
    video, canvas, img.result { display: block; width: 100%; height: auto; border-radius: 3px; }
    video { background: #000; }
    canvas { background: #000; }
    img.result { background: #000; min-height: 120px; object-fit: contain; }
    #log { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 10px 12px; font-family: 'SF Mono', Consolas, monospace; font-size: 12px; color: var(--muted); white-space: pre-wrap; min-height: 80px; max-height: 240px; overflow-y: auto; margin-top: 10px; }
    .muted { color: var(--muted); font-size: 13px; }
    .error { color: var(--error); }
    .cta { display: flex; justify-content: center; margin: 16px 0 8px; }
    .cta button { font-size: 16px; padding: 12px 32px; }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Character Portrait Test</h1>
    <p>Takes a photo and runs it through ComfyUI img2img stylisation to generate an Alphonse&nbsp;Mucha-style RPG portrait. Standalone test for the same workflow used by the character sheet.</p>
  </header>

  <section>
    <h2>1 · Source photo</h2>
    <div class="row">
      <button id="startCam">Use camera</button>
      <button id="capture" disabled>Capture frame</button>
      <button id="stopCam" class="secondary" disabled>Stop camera</button>
      <span class="muted">or</span>
      <label style="margin: 0;"><input type="file" id="fileIn" accept="image/*" capture="user"></label>
    </div>
    <div class="media">
      <div>
        <h3>Camera</h3>
        <video id="cam" autoplay playsinline muted></video>
      </div>
      <div>
        <h3>Source (what we'll send)</h3>
        <canvas id="preview"></canvas>
      </div>
    </div>
  </section>

  <section>
    <h2>2 · Character details</h2>
    <label><span class="lbl">Subject</span>
      <select id="classNoun">
        <option value="man">Man</option>
        <option value="woman">Woman</option>
        <option value="person">Person</option>
      </select>
    </label>
    <label><span class="lbl">Occupation</span>
      <input type="text" id="occupation" value="police officer attached to an occult unit">
    </label>
    <label><span class="lbl">Defining skill</span>
      <input type="text" id="skill" value="Sense Vestigia &mdash; attuned to magical residue">
    </label>
    <label><span class="lbl">Style note</span>
      <input type="text" id="style" value="Alphonse Mucha art nouveau, painterly linework, decorative halo and floral border motifs, muted earthy palette">
    </label>
  </section>

  <div class="cta">
    <button id="generate" disabled>Generate portrait</button>
  </div>

  <section>
    <h2>Status</h2>
    <div id="log"></div>
  </section>

  <section>
    <h2>Result</h2>
    <img id="result" class="result" alt="Generated portrait will appear here">
    <p class="muted" id="resultMeta"></p>
  </section>

</div>

<script>
// ----- DOM refs -----
const $ = (id) => document.getElementById(id);
const logEl = $('log');

function log(msg, cls) {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

// ----- Camera -----
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1024 }, height: { ideal: 1024 } },
      audio: false
    });
    $('cam').srcObject = stream;
    $('startCam').disabled = true;
    $('stopCam').disabled = false;
    $('capture').disabled = false;
  } catch (e) {
    log('Camera error: ' + e.message, 'error');
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  $('cam').srcObject = null;
  $('startCam').disabled = false;
  $('stopCam').disabled = true;
  $('capture').disabled = true;
}

function drawToPreview(source, w, h) {
  const preview = $('preview');
  // Clamp to a sensible upload size so we don't push a 4K phone photo across the wire.
  const MAX = 1024;
  const scale = Math.min(1, MAX / Math.max(w, h));
  preview.width = Math.round(w * scale);
  preview.height = Math.round(h * scale);
  preview.getContext('2d').drawImage(source, 0, 0, preview.width, preview.height);
  $('generate').disabled = false;
}

function captureFrame() {
  const video = $('cam');
  drawToPreview(video, video.videoWidth, video.videoHeight);
  log('Captured frame from camera.');
}

function loadFile(ev) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    drawToPreview(img, img.naturalWidth, img.naturalHeight);
    URL.revokeObjectURL(img.src);
    log(`Loaded ${file.name} (${img.naturalWidth}×${img.naturalHeight}).`);
  };
  img.onerror = () => log('Could not read image file.', 'error');
  img.src = URL.createObjectURL(file);
}

// ----- Folly proxy API (talks to ComfyUI server-side) -----
async function canvasToBlob(canvas) {
  return new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.92));
}

async function uploadImage(blob) {
  const form = new FormData();
  form.append('image', blob, 'portrait_input.jpg');
  form.append('overwrite', 'true');
  const res = await fetch('/api/portrait/upload', { method: 'POST', body: form, credentials: 'include' });
  if (!res.ok) throw new Error(`Upload failed: HTTP ${res.status} — ${await res.text().catch(() => '')}`);
  const json = await res.json();
  return json.name;
}

async function queuePrompt(image, sheet) {
  const res = await fetch('/api/portrait/prompt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ image, sheet })
  });
  if (!res.ok) throw new Error(`Queue failed: HTTP ${res.status} — ${await res.text().catch(() => '')}`);
  const json = await res.json();
  if (!json.prompt_id) throw new Error(`No prompt_id in response: ${JSON.stringify(json)}`);
  return json.prompt_id;
}

async function waitForHistory(promptId, { timeoutMs = 10 * 60 * 1000, pollMs = 2500 } = {}) {
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    const res = await fetch(`/api/portrait/history/${encodeURIComponent(promptId)}`, { credentials: 'include' });
    if (res.ok) {
      const json = await res.json();
      const entry = json[promptId];
      if (entry && entry.status && entry.status.completed) return entry;
      if (entry && entry.status && entry.status.status_str === 'error') {
        throw new Error(`ComfyUI error: ${JSON.stringify(entry.status)}`);
      }
    }
    await new Promise((r) => setTimeout(r, pollMs));
    log('  ...still running', 'muted');
  }
  throw new Error('Timed out waiting for ComfyUI.');
}

async function fetchOutput(imgInfo) {
  const params = new URLSearchParams();
  params.set('filename', imgInfo.filename);
  if (imgInfo.subfolder) params.set('subfolder', imgInfo.subfolder);
  params.set('type', imgInfo.type || 'output');
  const res = await fetch(`/api/portrait/view?${params}`, { credentials: 'include' });
  if (!res.ok) throw new Error(`View failed: HTTP ${res.status}`);
  return res.blob();
}

// ----- Main flow -----
async function generate() {
  clearLog();
  const btn = $('generate');
  btn.disabled = true;
  try {
    const classNoun = $('classNoun').value;
    const occupation = $('occupation').value.trim();
    const skill = $('skill').value.trim();
    const styleNote = $('style').value.trim();

    // 1. Canvas → JPEG blob
    const blob = await canvasToBlob($('preview'));
    log(`Source photo: ${Math.round(blob.size / 1024)} KB`);

    // 2. Upload (via Folly proxy)
    log('→ uploading photo...');
    const uploadedName = await uploadImage(blob);
    log(`  stored as: ${uploadedName}`);

    // 3. Queue (via Folly proxy)
    const sheet = {
      pronouns: classNoun === 'woman' ? 'she/her' : classNoun === 'man' ? 'he/him' : 'they/them',
      occupation,
      reputation: styleNote,
      additional_skills: [{ name: skill, value: '60' }]
    };
    log('→ queueing prompt...');
    const promptId = await queuePrompt(uploadedName, sheet);
    log(`  prompt_id: ${promptId}`);

    // 5. Poll
    log('→ waiting for generation...');
    const entry = await waitForHistory(promptId);
    log('Done.');

    // 6. Fetch and display
    const outputs = entry.outputs || {};
    const saveNode = outputs['8'] || Object.values(outputs).find((o) => o && o.images && o.images.length);
    if (!saveNode || !saveNode.images || !saveNode.images.length) {
      throw new Error('No output images in history entry.');
    }
    const imgInfo = saveNode.images[0];
    const imgBlob = await fetchOutput(imgInfo);
    const resultEl = $('result');
    if (resultEl.src && resultEl.src.startsWith('blob:')) URL.revokeObjectURL(resultEl.src);
    resultEl.src = URL.createObjectURL(imgBlob);
    $('resultMeta').textContent =
      `${imgInfo.filename} — ${Math.round(imgBlob.size / 1024)} KB`;
    log(`Saved on server as ${imgInfo.filename}.`);
  } catch (e) {
    log('FAILED: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ----- Wire up -----
$('startCam').addEventListener('click', startCamera);
$('stopCam').addEventListener('click', stopCamera);
$('capture').addEventListener('click', captureFrame);
$('fileIn').addEventListener('change', loadFile);
$('generate').addEventListener('click', generate);
</script>
</body>
</html>
